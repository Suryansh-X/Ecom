<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Vijay Electronics Mukerian | Best Home Appliances Store</title>
    <meta name="description" content="Vijay Electronics Mukerian (Railway Road). Top deals on Refrigerators, Washing Machines, ACs, LED TVs, and Kitchen Appliances. Shop live in Mukerian, Punjab.">
    <meta name="keywords" content="Vijay Electronics Mukerian, Home Appliances Mukerian, Fridge shop Mukerian, Washing machine Mukerian, AC dealer Mukerian, LED TV shop Mukerian, Punjab Electronics">
    
    <meta name="theme-color" content="#ff00cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --accent: #ff00cc;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --bg: #0d0221;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 0% 0%, #25005a, var(--bg)),
                        radial-gradient(circle at 100% 100%, var(--accent), var(--bg));
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER UI */
        header { 
            text-align: center; 
            padding: 80px 20px 40px; 
            animation: fadeInDown 1s ease;
        }
        .logo { font-size: 3.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }
        .tagline { letter-spacing: 5px; color: var(--accent); font-size: 0.8rem; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .location { opacity: 0.5; font-size: 0.85rem; margin-top: 8px; }

        /* GRID SYSTEM */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 30px;
        }

        /* GLASSMORPHIC PRODUCT CARDS */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 60px rgba(255, 0, 204, 0.2);
        }

        .img-box {
            width: 100%;
            height: 260px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserves appliance proportions */
            padding: 10px;
        }

        .title { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .description { font-size: 0.9rem; opacity: 0.7; margin: 10px 0; min-height: 40px; }
        .price { font-size: 1.8rem; font-weight: 900; color: #00ffcc; margin-bottom: 20px; }

        /* ACTION BUTTONS */
        .buy-btn {
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 0, 204, 0.2);
        }

        .buy-btn:active { transform: scale(0.95); }

        /* ADMIN SYSTEM */
        .gear-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 24px;
            opacity: 0.2;
            cursor: pointer;
            z-index: 1000;
            background: var(--glass);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }

        .gear-icon:hover { opacity: 1; transform: rotate(90deg); }

        #adminModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            width: 90%;
            max-width: 450px;
        }

        .modal-content {
            background: #1a0b33;
            border: 1px solid var(--accent);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* DELETE BUTTON FOR ADMIN */
        .del-tag {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.2;
            cursor: pointer;
        }
        .del-tag:hover { color: #ff4d4d; opacity: 1; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">Vijay Electronics</h1>
    <div class="tagline">Home Appliances Mukerian</div>
    <div class="location">Railway Road, Mukerian, Punjab</div>
</header>

<div class="container">
    <div id="shopGrid" class="grid">
        </div>
</div>

<div class="gear-icon" onclick="launchAdmin()">⚙️</div>

<div id="adminModal">
    <div class="modal-content card">
        <h2 style="margin-top:0">Update Inventory</h2>
        <input type="text" id="nameIn" placeholder="Product Name (e.g. LG Inverter Fridge)">
        <input type="number" id="priceIn" placeholder="Price (INR)">
        <textarea id="descIn" placeholder="Features (e.g. 10 Year Warranty, 5 Star)" rows="3"></textarea>
        <input type="file" id="imgIn" accept="image/*" capture="environment">
        <button class="buy-btn" onclick="saveToFirebase()">Publish to Website</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:white; margin-top:15px; width:100%; cursor:pointer; opacity:0.5;">Cancel</button>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyAjhi25Q8urRDAS33nxMl3J3PCh8u8-b64",
        authDomain: "igelectrons.firebaseapp.com",
        projectId: "igelectrons",
        storageBucket: "igelectrons.firebasestorage.app",
        messagingSenderId: "373640471784",
        appId: "1:373640471784:web:00c76eacefce6944b1955d",
        databaseURL: "https://igelectrons-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ADMIN FUNCTIONS
    function launchAdmin() {
        if(prompt("Enter Shop Admin PIN:") === "ig99") {
            document.getElementById('adminModal').style.display = 'block';
        }
    }

    function closeAdmin() {
        document.getElementById('adminModal').style.display = 'none';
    }

    function saveToFirebase() {
        const file = document.getElementById('imgIn').files[0];
        const name = document.getElementById('nameIn').value;
        const price = document.getElementById('priceIn').value;
        const desc = document.getElementById('descIn').value;

        if(!file || !name || !price) return alert("Please fill Name, Price and Image");

        const reader = new FileReader();
        reader.onloadend = () => {
            db.ref('inventory').push({
                name: name,
                price: price,
                desc: desc,
                img: reader.result
            }).then(() => {
                alert("Successfully Added!");
                closeAdmin();
                document.getElementById('nameIn').value = '';
                document.getElementById('priceIn').value = '';
                document.getElementById('descIn').value = '';
            });
        };
        reader.readAsDataURL(file);
    }

    // 3. LIVE SYNC ENGINE
    db.ref('inventory').on('value', (snapshot) => {
        const data = snapshot.val();
        const shopGrid = document.getElementById('shopGrid');
        let html = '';

        for (let id in data) {
            const p = data[id];
            html += `
                <div class="card">
                    <div class="img-box">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <h3 class="title">${p.name}</h3>
                    <p class="description">${p.desc}</p>
                    <div class="price">₹${parseInt(p.price).toLocaleString('en-IN')}</div>
                    <button class="buy-btn" onclick="orderWhatsApp('${p.name}', '${p.price}')">Order on WhatsApp</button>
                    <div class="del-tag" onclick="removeItem('${id}')">[ Admin: Delete Listing ]</div>
                </div>
            `;
        }
        shopGrid.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.5;">Welcome to Vijay Electronics. Our online catalog is being updated.</div>';
    });

    function removeItem(id) {
        if(confirm("Permanently remove this appliance from the store?")) {
            db.ref('inventory/' + id).remove();
        }
    }

    function orderWhatsApp(name, price) {
        const message = `Hi Vijay Electronics Mukerian, I am interested in: ${name} (Price: INR ${price}). Is this in stock?`;
        window.open(`https://wa.me/91987698832?text=${encodeURIComponent(message)}`);
    }
</script>

</body>
  </html>
