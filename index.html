<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vijay Electronics | Railway Road Mukerian</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --brand: #2d5bff;
            --brand-dark: #1a3ab7;
            --surface: #0a0a0a;
            --card: #151517;
            --text-high: #ffffff;
            --text-low: #8e8e93;
            --border: rgba(255,255,255,0.08);
            --nav-blur: rgba(10, 10, 10, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--surface); color: var(--text-high); overflow-x: hidden; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: var(--nav-blur); backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .search-bar {
            flex-grow: 0.5; background: rgba(255,255,255,0.05); border-radius: 12px;
            padding: 8px 15px; display: flex; align-items: center; border: 1px solid var(--border);
        }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; outline: none; width: 100%; }

        /* HERO AREA */
        .hero-banner {
            height: 85vh; background: linear-gradient(to bottom, rgba(0,0,0,0.4), var(--surface)), 
            url('https://images.unsplash.com/photo-1550009158-9ebf69173e03?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; padding: 0 8%;
        }
        .hero-banner h2 { font-size: 4.5rem; font-weight: 800; line-height: 1; max-width: 800px; }
        .hero-banner p { font-size: 1.25rem; color: var(--text-low); margin: 20px 0 40px; max-width: 500px; }

        /* TIERED SECTIONS */
        .page-width { padding: 80px 5%; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .section-header h3 { font-size: 2rem; font-weight: 800; }
        
        /* CATEGORY SCROLLER */
        .category-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
        .tab { 
            padding: 12px 25px; background: var(--card); border-radius: 100px; 
            border: 1px solid var(--border); cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab.active { background: var(--brand); border-color: var(--brand); }

        /* PRODUCT GRID */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .product-card { 
            background: var(--card); border-radius: 30px; padding: 25px; 
            border: 1px solid var(--border); transition: 0.4s; position: relative;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--brand); }
        .product-img { 
            height: 250px; background: #000; border-radius: 20px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .product-img img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .price-row .val { font-size: 1.6rem; font-weight: 800; }

        .btn-action { 
            background: var(--brand); color: white; border: none; padding: 14px 25px; 
            border-radius: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* ADMIN DRAWER */
        #adminUI {
            position: fixed; top: 0; right: -500px; width: 500px; height: 100%;
            background: #111; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 50px; border-left: 1px solid var(--brand);
        }
        #adminUI.open { right: 0; }
        .form-row { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--text-low); margin-bottom: 8px; }
        input, select, textarea { 
            width: 100%; background: #1a1a1a; border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; color: white;
        }

        /* CART INDICATOR */
        .cart-bubble {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            padding: 15px 30px; border-radius: 100px; display: flex; align-items: center;
            gap: 15px; cursor: pointer; box-shadow: 0 10px 40px rgba(37, 211, 102, 0.3); z-index: 100;
        }

        @media (max-width: 768px) {
            .hero-banner h2 { font-size: 2.8rem; }
            #adminUI { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div style="background: var(--brand); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center;">
            <i class="ph-bold ph-lightning"></i>
        </div>
        <h1>VIJAY ELECTRONICS</h1>
    </div>
    
    <div class="search-bar">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search brands or products..." onkeyup="handleSearch()">
    </div>

    <div style="display:flex; gap:20px; align-items:center;">
        <i class="ph ph-sliders-horizontal" onclick="openAdmin()" style="cursor:pointer; font-size:1.4rem;"></i>
    </div>
</header>

<section class="hero-banner">
    <p>Railway Road • Mukerian</p>
    <h2>Upgrade Your <br> Living Standards.</h2>
    <p>Premium home appliances with authorized warranty and 24-hour delivery in Mukerian.</p>
</section>

<div class="page-width">
    <div class="category-tabs" id="catTabs">
        <div class="tab active" onclick="filterData('All')">All Inventory</div>
        <div class="tab" onclick="filterData('Television')">LED TVs</div>
        <div class="tab" onclick="filterData('Cooling')">Air Conditioners</div>
        <div class="tab" onclick="filterData('Kitchen')">Kitchen Tech</div>
        <div class="tab" onclick="filterData('Cleaning')">Laundry</div>
    </div>

    <div class="section-header">
        <h3>Featured Collections</h3>
    </div>

    <div class="product-grid" id="mainGrid">
        </div>
</div>

<div id="adminUI">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <h2>Stock Manager</h2>
        <i class="ph ph-x" onclick="openAdmin()" style="cursor:pointer; font-size:1.5rem;"></i>
    </div>

    <div class="form-row">
        <label>Product Name</label>
        <input type="text" id="admName" placeholder="e.g. Sony Bravia 55' OLED">
    </div>
    <div class="form-row">
        <label>Category</label>
        <select id="admCat">
            <option value="Television">Television</option>
            <option value="Cooling">Cooling</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Cleaning">Cleaning</option>
        </select>
    </div>
    <div class="form-row">
        <label>Display Price (INR)</label>
        <input type="number" id="admPrice" placeholder="55000">
    </div>
    <div class="form-row">
        <label>Specs/Features</label>
        <textarea id="admDesc" rows="3"></textarea>
    </div>
    <div class="form-row">
        <label>Product Image</label>
        <input type="file" id="admFile" accept="image/*">
    </div>

    <button class="btn-action" style="width:100%; margin-top:20px; justify-content:center;" onclick="pushProduct()">
        <i class="ph ph-cloud-arrow-up"></i> Sync to Website
    </button>
</div>

<div class="cart-bubble" onclick="sendWhatsAppOrder()">
    <i class="ph-fill ph-whatsapp-logo" style="font-size:1.8rem;"></i>
    <div>
        <div style="font-size:0.7rem; font-weight:700; opacity:0.8;">WHATSAPP ORDER</div>
        <div id="cartStatus" style="font-weight:800;">0 Items selected</div>
    </div>
</div>

<script>
    // INITIALIZE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAjhi25Q8urRDAS33nxMl3J3PCh8u8-b64",
        authDomain: "igelectrons.firebaseapp.com",
        projectId: "igelectrons",
        storageBucket: "igelectrons.firebasestorage.app",
        messagingSenderId: "373640471784",
        appId: "1:373640471784:web:00c76eacefce6944b1955d",
        databaseURL: "https://igelectrons-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let localInventory = [];
    let cart = [];

    // CORE FUNCTIONS
    function openAdmin() {
        if(!document.getElementById('adminUI').classList.contains('open')) {
            if(prompt("Staff PIN:") !== "ig99") return;
        }
        document.getElementById('adminUI').classList.toggle('open');
    }

    function pushProduct() {
        const name = document.getElementById('admName').value;
        const cat = document.getElementById('admCat').value;
        const price = document.getElementById('admPrice').value;
        const desc = document.getElementById('admDesc').value;
        const file = document.getElementById('admFile').files[0];

        if(!file || !name) return alert("Fill all details");

        const reader = new FileReader();
        reader.onloadend = () => {
            db.ref('inventory').push({ name, cat, price, desc, img: reader.result })
            .then(() => {
                alert("Inventory Updated!");
                location.reload();
            });
        };
        reader.readAsDataURL(file);
    }

    db.ref('inventory').on('value', (snap) => {
        const data = snap.val();
        localInventory = [];
        for(let id in data) localInventory.push({id, ...data[id]});
        render(localInventory);
    });

    function render(data) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = data.map(p => `
            <div class="product-card">
                <div class="product-img"><img src="${p.img}"></div>
                <div style="font-size:0.75rem; color:var(--brand); font-weight:800; margin-bottom:5px;">${p.cat.toUpperCase()}</div>
                <h4 style="font-size:1.2rem; height:50px; overflow:hidden;">${p.name}</h4>
                <p style="font-size:0.85rem; color:var(--text-low); margin:10px 0;">${p.desc.substring(0, 60)}...</p>
                <div class="price-row">
                    <div class="val">₹${parseInt(p.price).toLocaleString('en-IN')}</div>
                    <button class="btn-action" onclick="addToCart('${p.name}', ${p.price})">
                        <i class="ph ph-plus"></i> Add
                    </button>
                </div>
                <div style="margin-top:15px; font-size:0.6rem; opacity:0.2; cursor:pointer" onclick="deleteItem('${p.id}')">ADMIN: DELETE</div>
            </div>
        `).join('');
    }

    function filterData(category) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(category === 'All') return render(localInventory);
        render(localInventory.filter(p => p.cat === category));
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        render(localInventory.filter(p => p.name.toLowerCase().includes(query)));
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cartStatus').innerText = `${cart.length} Items Selected`;
    }

    function sendWhatsAppOrder() {
        if(cart.length === 0) return alert("Add products to order first.");
        const details = cart.map(i => `• ${i.name} (₹${i.price})`).join('%0A');
        const total = cart.reduce((s, i) => s + parseInt(i.price), 0);
        const text = `Hi Vijay Electronics Mukerian!%0AI want to buy:%0A${details}%0A%0ATotal: ₹${total.toLocaleString('en-IN')}`;
        window.open(`https://wa.me/91987698832?text=${text}`);
    }

    function deleteItem(id) {
        if(confirm("Permanently delete?")) db.ref('inventory/' + id).remove();
    }
</script>

</body>
    </html>
