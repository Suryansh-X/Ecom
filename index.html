<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG ELECTRONS | Premium Showroom Mukerian</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --brand: #3d5afe;
            --surface: #0a0a0a;
            --card-bg: #151517;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --whatsapp: #25d366;
            --danger: #ff4b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--surface); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* NAVIGATION */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--brand); }

        /* HERO SECTION */
        .hero { padding: 140px 5% 40px; text-align: center; }
        .hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .hero p { color: var(--text-dim); font-size: 1.1rem; }

        /* CATEGORY FILTER */
        .tabs { display: flex; gap: 12px; overflow-x: auto; padding: 20px 5%; margin-bottom: 20px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            padding: 10px 24px; background: var(--card-bg); border-radius: 100px; 
            border: 1px solid var(--border); cursor: pointer; white-space: nowrap; 
            font-size: 0.9rem; font-weight: 600; transition: 0.3s;
        }
        .tab.active { background: var(--brand); border-color: var(--brand); }

        /* PRODUCT GRID */
        .grid { display: grid; padding: 0 5% 100px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { 
            background: var(--card-bg); border-radius: 28px; padding: 20px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; 
        }
        .card:hover { border-color: var(--brand); transform: translateY(-5px); }

        .img-box { 
            height: 240px; background: #000; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px; 
        }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .price { font-size: 1.6rem; font-weight: 800; margin: 15px 0; color: #fff; }
        
        .whatsapp-btn {
            background: var(--whatsapp); color: #fff; text-decoration: none; text-align: center;
            padding: 16px; border-radius: 18px; font-weight: 700; display: flex; 
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .whatsapp-btn:hover { filter: brightness(1.1); }

        /* ADMIN PANEL DRAWER */
        #adminUI {
            position: fixed; top: 0; right: -100%; width: 500px; height: 100%;
            background: #111; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px; border-left: 1px solid var(--brand); overflow-y: auto;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
        }
        #adminUI.open { right: 0; }
        .admin-trigger { position: fixed; bottom: 30px; left: 30px; opacity: 0.1; cursor: pointer; transition: 0.3s; }
        .admin-trigger:hover { opacity: 1; color: var(--brand); }

        input, select, textarea { 
            width: 100%; padding: 14px; background: #050505; border: 1px solid var(--border); 
            color: white; border-radius: 12px; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--brand); }

        .manage-item { 
            background: #1a1a1a; padding: 15px; border-radius: 16px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .controls { display: flex; gap: 15px; font-size: 0.8rem; font-weight: 800; }
        .edit-btn { color: var(--brand); cursor: pointer; }
        .del-btn { color: var(--danger); cursor: pointer; }

        @media (max-width: 768px) { #adminUI { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="logo">IG <span>ELECTRONS</span></div>
    <div style="text-align: right;">
        <div style="font-size: 0.7rem; font-weight: 800; color: var(--brand);">RAILWAY ROAD</div>
        <div style="font-size: 0.6rem; color: var(--text-dim);">MUKERIAN, PUNJAB</div>
    </div>
</header>

<section class="hero">
    <h1>Smart Choice. Smart Home.</h1>
    <p>Discover the latest appliances from global brands at local prices.</p>
</section>

<div class="tabs">
    <div class="tab active" onclick="filterData('All', this)">All Products</div>
    <div class="tab" onclick="filterData('TV', this)">LED Television</div>
    <div class="tab" onclick="filterData('Cooling', this)">AC & Fridge</div>
    <div class="tab" onclick="filterData('Kitchen', this)">Kitchen Tech</div>
    <div class="tab" onclick="filterData('Laundry', this)">Washing Machines</div>
</div>

<div id="productGrid" class="grid"></div>

<div id="adminUI">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2>Staff Command Center</h2>
        <i class="ph ph-x" onclick="closeAdmin()" style="cursor:pointer; font-size:1.5rem;"></i>
    </div>

    <div style="background: rgba(61, 90, 254, 0.1); padding: 25px; border-radius: 24px; border: 1px solid var(--brand); margin-bottom: 40px;">
        <h4 style="margin-bottom:15px; color: var(--brand);">Add or Edit Product</h4>
        <input type="hidden" id="editId">
        <input type="text" id="pName" placeholder="Product Title">
        <select id="pCat">
            <option value="TV">Television</option>
            <option value="Cooling">Cooling</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Laundry">Laundry</option>
        </select>
        <input type="number" id="pPrice" placeholder="Price (INR)">
        <textarea id="pDesc" placeholder="Key Features / Warranty..." rows="2"></textarea>
        <label style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; display: block;">Product Photo</label>
        <input type="file" id="pFile" accept="image/*">
        <button onclick="saveProduct()" style="width:100%; padding:16px; border-radius:12px; border:none; background:var(--brand); color:#fff; font-weight:800; cursor:pointer;">Push to Live Showroom</button>
    </div>

    <h3 style="margin-bottom:20px; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Inventory Management</h3>
    <div id="adminList"></div>
</div>

<div class="admin-trigger" onclick="openAdmin()"><i class="ph ph-lock-key" style="font-size: 28px;"></i></div>

<script>
    // 1. DATABASE CONNECTION
    const firebaseConfig = {
        apiKey: "AIzaSyAjhi25Q8urRDAS33nxMl3J3PCh8u8-b64",
        authDomain: "igelectrons.firebaseapp.com",
        projectId: "igelectrons",
        storageBucket: "igelectrons.firebasestorage.app",
        messagingSenderId: "373640471784",
        appId: "1:373640471784:web:00c76eacefce6944b1955d",
        databaseURL: "https://igelectrons-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentInventory = [];

    // 2. ADMIN ACCESS
    function openAdmin() {
        if(prompt("Enter IG Staff Access PIN:") === "ig99") {
            document.getElementById('adminUI').classList.add('open');
        } else {
            alert("Unauthorized access.");
        }
    }
    function closeAdmin() { document.getElementById('adminUI').classList.remove('open'); }

    // 3. DATA SYNC
    db.ref('inventory').on('value', (snap) => {
        const data = snap.val();
        currentInventory = [];
        for(let id in data) currentInventory.push({id, ...data[id]});
        renderPublic(currentInventory);
        renderAdmin(currentInventory);
    });

    // 4. RENDERING FUNCTIONS
    function renderPublic(items) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = items.map(p => {
            const predefinedText = `Hi IG ELECTRONS Mukerian, I am interested in purchasing the ${p.name} (Price: ₹${p.price}). Is it available in your store?`;
            const waUrl = `https://wa.me/919876898832?text=${encodeURIComponent(predefinedText)}`;
            
            return `
                <div class="card">
                    <div class="img-box"><img src="${p.img}"></div>
                    <small style="color:var(--brand); font-weight:800; font-size: 0.7rem;">${p.cat.toUpperCase()}</small>
                    <h3 style="margin:10px 0; height:50px; overflow:hidden; font-size: 1.15rem;">${p.name}</h3>
                    <div class="price">₹${parseInt(p.price).toLocaleString('en-IN')}</div>
                    <a href="${waUrl}" target="_blank" class="whatsapp-btn">
                        <i class="ph-fill ph-whatsapp-logo"></i> Buy via WhatsApp
                    </a>
                </div>
            `;
        }).join('');
    }

    function renderAdmin(items) {
        const list = document.getElementById('adminList');
        list.innerHTML = items.map(p => `
            <div class="manage-item">
                <div style="max-width: 60%;">
                    <div style="font-weight:700; font-size:0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.name}</div>
                    <div style="font-size:0.7rem; color:var(--text-dim);">₹${p.price} | ${p.cat}</div>
                </div>
                <div class="controls">
                    <span class="edit-btn" onclick="startEdit('${p.id}')">EDIT</span>
                    <span class="del-btn" onclick="deleteItem('${p.id}')">DELETE</span>
                </div>
            </div>
        `).join('');
    }

    // 5. STAFF OPERATIONS
    function saveProduct() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('pName').value;
        const cat = document.getElementById('pCat').value;
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value;
        const file = document.getElementById('pFile').files[0];

        if(!name || !price) return alert("Product Name and Price are mandatory.");

        const executePush = (imgData = null) => {
            const payload = { name, cat, price, desc };
            if(imgData) payload.img = imgData;

            if(id) {
                db.ref('inventory/' + id).update(payload).then(() => {
                    alert("Product updated successfully.");
                    resetForm();
                });
            } else {
                if(!imgData) return alert("Please upload a product photo for new entries.");
                db.ref('inventory').push(payload).then(() => {
                    alert("Product added to showroom.");
                    resetForm();
                });
            }
        };

        if(file) {
            const reader = new FileReader();
            reader.onloadend = () => executePush(reader.result);
            reader.readAsDataURL(file);
        } else {
            executePush();
        }
    }

    function startEdit(id) {
        const item = currentInventory.find(p => p.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('pName').value = item.name;
        document.getElementById('pCat').value = item.cat;
        document.getElementById('pPrice').value = item.price;
        document.getElementById('pDesc').value = item.desc;
        alert("Details loaded. Modify fields and click 'Push to Live Showroom' to save.");
    }

    function deleteItem(id) {
        if(confirm("Are you sure you want to PERMANENTLY remove this product from the website?")) {
            db.ref('inventory/' + id).remove();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pDesc').value = '';
        document.getElementById('pFile').value = '';
    }

    function filterData(cat, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderPublic(cat === 'All' ? currentInventory : currentInventory.filter(p => p.cat === cat));
    }
</script>

</body>
    </html>
